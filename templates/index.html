<!DOCTYPE html>
<html>
<head>
  <title>Cracks to Craters</title>
  <style>
    * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Inter", "Segoe UI", sans-serif;
  background-color: #0a0a12;
  display: flex;
  flex-wrap: wrap;
  gap: 1.5rem;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
}

.card {
  background: #ffffff;
  border: 1px solid #e5e7eb;
  border-radius: 16px;
  padding: 2rem;
  width: 100%;
  max-width: 420px;
  max-height: 500px; /* limit height */
  overflow: hidden; /* prevent spilling */
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
  display: flex;
  flex-direction: column;
}


.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
}

header {
  font-size: 1.3rem;
  font-weight: 600;
  margin-bottom: 1.5rem;
  color: #111827;
}

input,
select {
  display: block;
  width: 100%;
  margin-bottom: 12px;
  padding: 11px 12px;
  border: 1px solid #d1d5db;
  border-radius: 10px;
  font-size: 14px;
  outline: none;
  background: #f9fafb;
  transition: all 0.2s ease;
}

input:focus,
select:focus {
  border-color: #6366f1;
  background: #ffffff;
  box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
}

button {
  width: 100%;
  margin-top: 8px;
  padding: 12px;
  background: linear-gradient(135deg, #4f46e5, #6366f1);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 18px rgba(99, 102, 241, 0.3);
}

button:active {
  transform: scale(0.98);
}

#result, #assistant_response {
  margin-top: 1rem;
  font-size: 17px;
  color: #374151;
  overflow-y: auto; /* scroll instead of expand */
  max-height: 250px; /* controls chat output area */
  padding-right: 4px;
}
  </style>
</head>
<body>
  <div class="card">
    <header>Pothole Risk Prediction</header>
    <input id="f1" placeholder="Average Rainfall (mm)">
    <input id="f2" placeholder="Traffic Volume (Vehicles per hour)">
    <input id="f3" placeholder="Pavement Age (years)">
    <input id="f4" placeholder="Last Repair (years)">
    <select id="f5">
        <option value="clay">Clay</option>
        <option value="gravel">Gravel</option>
        <option value="sandy">Sandy</option>
    </select>
    <button onclick="predict()">Predict</button>
    <p id="result"></p>
  </div>
  <div class="card">
    <header>Chat with Tanya - Your Road Safety Advisor</header>
    <input id="chat" placeholder="Ask">
    <button onclick="sendMessage()">Send</button>
    <p id="assistant_response"></p>
  </div>

  <script>
    async function predict() {
        const res = await fetch("/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                "avg_rainfall_mm": parseFloat(f1.value),
                "traffic_volume_vph": parseFloat(f2.value),
                "pavement_age_yrs": parseFloat(f3.value),
                "last_repair_yrs": parseFloat(f4.value),
                "soil_type": f5.value
        })
    })
        const data = await res.json()
        result.innerText = data.prediction ?? "invalid input"
    }

    async function sendMessage() {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({
            "message":chat.value
          })
        }) // sends this to the api
        const response_json = await res.json() // response form the backend
        assistant_response.innerText = response_json.response ?? "Error getting response"

        document.getElementById("chat").value = "" // reset input field
    }
  </script>
</body>
</html>
